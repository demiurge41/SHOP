services:
  web:
    container_name: shop_web
    build:
      context: .
    command: sh -c "python manage.py makemigrations &&  python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "7001:8000"
    env_file:
      .env
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    container_name: shop_postgres
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    container_name: shop_redis
    image: redis:7
    volumes:
      - redis-data:/data
    
  celery_worker:
    container_name: shop_worker
    build:
      context: .
    command: celery -A shop_api worker --loglevel=info
    depends_on:
      - redis
    env_file:
      .env
    volumes:
      - .:/app

  celery_beat:
    container_name: shop_beat
    build:
      context: .
    command: celery -A shop_api beat --loglevel=info
    depends_on:
      - redis
    env_file:
      .env
    volumes:
      - .:/app
  
  celery_flower:
    build:
      context: .
    command: celery -A shop_api flower  --port=5555
    ports:
      - "5556:5555"
    container_name: shop_flower
    depends_on:
      - redis
    env_file:
      .env
    volumes:
      - .:/app

volumes:
  db-data:
  redis-data: